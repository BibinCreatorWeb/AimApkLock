<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aim Lock Dashboard - MODIFIED BY ZARATOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-page">
        <h1 style="color:#bc6aff; letter-spacing: 2px;">AIM LOCK ZARATOS</h1>
        <div class="login-card">
            <div class="avatar">
                <img src="https://smail.my.id/cloud/Cp3kZNQn1" alt="Logo Login" onerror="this.onerror=null; this.parentElement.innerHTML='Cp3kZNQn1';">
            </div>
            <h3 style="margin:0;">Login Account</h3>
            <p style="font-size: 0.7rem; color: #a084b1; margin-bottom: 20px;">Enter credentials to access dashboard</p>
            
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="user" placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="pass" placeholder="Enter password">
            </div>
            <button class="login-btn" onclick="checkLogin()">LOGIN</button>
        </div>
    </div>

    <div id="dashboard-page">
        <div class="menu-header">
            <div class="logo-display">
                <img src="https://smail.my.id/cloud/Cp3kZNQn1" alt="Menu Logo" onerror="this.onerror=null; this.parentElement.innerHTML='Cp3kZNQn1';" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <div style="color:#8e2de2; font-size:10px; margin-top:5px;">Zaratos Menu</div>
        </div>

        <div class="menu-item"><span>AIMBOT 95%</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
        <div class="menu-item"><span>AIMLOCK 98%</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
        <div class="menu-item"><span>AIMPOR TIRO</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
        <div class="menu-item"><span>AIM POR MIRA</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
        <div class="menu-item"><span>AIM MACRO</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>

        <div class="separator">---------- MENU NORECOIL ----------</div>

        <div class="menu-item"><span>MIRA AJUSTADA</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
        <div class="menu-item"><span>MIRA CALIBRADA</span> <label class="switch"><input type="checkbox"><span class="slider"></span></label></div>

        <div class="footer-buttons">
            <button>FF NORMAL</button>
            <button>FF MAX</button>
        </div>
        <div class="debug-note">Ceeate By Zaratos To Help You Easy Win</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
